name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Convention: job `name:` values are a contract. The "Protect main" ruleset requires
# these check names (Backend checks, Frontend checks), so renaming or removing a job
# silently breaks merges until the ruleset's required status checks are updated to match.
# Change what runs *inside* a job freely; keep its name stable. If a name must change,
# update the ruleset's required_status_checks in the same PR.
jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      # Named steps that each call a target of the shared verify.sh — the same script
      # developers run locally (`./verify.sh` runs them all). Splitting the targets here
      # gives per-step pass/fail and timing in the job log without a second definition.
      - name: Install
        run: ./verify.sh install
      - name: Lint (ruff)
        run: ./verify.sh lint
      - name: Test (pytest)
        run: ./verify.sh test
      # Build the images on PRs only — keeps pushes to main fast.
      - name: Docker build
        if: github.event_name == 'pull_request'
        run: ./verify.sh docker

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # Named steps that each call a target of the shared verify.sh — the same script
      # developers run locally (`./verify.sh` runs them all). Splitting the targets here
      # gives per-step pass/fail and timing in the job log without a second definition.
      - name: Install
        run: ./verify.sh install
      - name: Lint
        run: ./verify.sh lint
      - name: Format check
        run: ./verify.sh format
      - name: Test
        run: ./verify.sh test
      - name: Build
        run: ./verify.sh build
      # Build the image on PRs only — keeps pushes to main fast.
      - name: Docker build
        if: github.event_name == 'pull_request'
        run: ./verify.sh docker
