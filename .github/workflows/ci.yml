name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      # Single source of truth: the same script developers run locally. It installs,
      # runs ruff + pytest, and (on PRs) docker-builds the backend and sandbox images.
      - name: Verify
        run: ./verify.sh
        env:
          # Keep pushes to main fast — build the images on PRs only.
          SKIP_DOCKER: ${{ github.event_name == 'pull_request' && '0' || '1' }}

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # Single source of truth: the same script developers run locally. It installs,
      # lints, format-checks, tests, builds, and (on PRs) docker-builds the image.
      - name: Verify
        run: ./verify.sh
        env:
          # Keep pushes to main fast — build the image on PRs only.
          SKIP_DOCKER: ${{ github.event_name == 'pull_request' && '0' || '1' }}
