# Ground truth for the eval. Two parts:
#   mutants:          per planted-hole, the finding the agent MUST report (true positives)
#   acceptable_noise: judgment-call findings the agent may surface against the REAL auth.py
#                     (spec-compliant / low-value) that must NOT count as false positives
# A finding "matches" an item if its text contains ANY of the `match` keywords (case-insensitive).
# See secagent/agent_core/eval.py.

mutants:
  expiry_not_checked:
    - id: expiry-bypass
      severity: high
      match: ["expired", "expiry", "exp claim", "exp not"]
      attack: "Mint a token whose exp is in the past and see it accepted."

  substring_scope:
    - id: scope-substring
      severity: high
      match: ["execute:codex", "substring", "look-alike", "lookalike", "scope prefix"]
      attack: "Present scope 'execute:codex' and see it accepted as 'execute:code'."

  audience_not_checked:
    - id: audience-bypass
      severity: high
      match: ["audience", "aud claim", "wrong audience"]
      attack: "Mint a token with a wrong/foreign audience and see it accepted."

  auth_disabled:
    - id: auth-disabled
      severity: critical
      match: ["no token", "without a token", "unauthenticated", "auth disabled", "missing token"]
      attack: "Call /api/execute with no Authorization header and see it accepted."

# Real auth.py: no planted holes, but a thorough agent surfaces these (both seen live 2026-06-07).
acceptable_noise:
  - id: aud-array-multivalue
    match: ["aud array", "multi-valued aud", "multivalued aud", "audience array", "array of audience", "array containing", "multiple audience"]
    note: "Spec-compliant: PyJWT/OIDC permit an aud array and pass if the expected aud is present."
  - id: empty-sub
    match: ["empty sub", "empty-string subject", "empty subject", "non-empty sub", "blank sub"]
    note: "Low-value hardening; sub is not gated and user_id is unused today."
