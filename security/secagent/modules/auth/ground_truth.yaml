# Ground truth for the eval. Three parts:
#   mutants:    per planted-hole, the finding the agent MUST report (drives recall on mutants)
#   real_auth:  GENUINE current findings in the real auth.py — real (low) issues the agent
#               SHOULD surface. Credited as true positives; missing one is a regression.
#   non_issues: spec-compliant / won't-fix behavior that is NOT a bug — ignored when scoring
#               (neither credited nor penalised), so it can't masquerade as a false positive.
# A finding "matches" an item if its text contains ANY of the `match` keywords (case-insensitive).
# See secagent/agent_core/eval.py.

mutants:
  expiry_not_checked:
    - id: expiry-bypass
      severity: high
      match: ["expired", "expiry", "exp claim", "exp not"]
      attack: "Mint a token whose exp is in the past and see it accepted."

  substring_scope:
    - id: scope-substring
      severity: high
      match: ["execute:codex", "substring", "look-alike", "lookalike", "scope prefix"]
      attack: "Present scope 'execute:codex' and see it accepted as 'execute:code'."

  audience_not_checked:
    - id: audience-bypass
      severity: high
      match: ["audience", "aud claim", "wrong audience"]
      attack: "Mint a token with a wrong/foreign audience and see it accepted."

  auth_disabled:
    - id: auth-disabled
      severity: critical
      match: ["no token", "without a token", "unauthenticated", "auth disabled", "missing token"]
      attack: "Call /api/execute with no Authorization header and see it accepted."

# Genuine current findings in the real auth.py (the agent SHOULD report these). Seen live 2026-06-07.
real_auth:
  - id: empty-sub
    severity: low
    match: ["empty sub", "empty-string subject", "empty subject", "non-empty sub", "blank sub"]
    note: "Real low-sev gap: sub is not required non-empty, so user_id can be ''. Harmless today
      (user_id is unused) but must be fixed before user_ids/quotas/tenancy rely on it."

# Spec-compliant / won't-fix — NOT bugs, ignored when scoring.
non_issues:
  - id: aud-array-multivalue
    match: ["aud array", "multi-valued aud", "multivalued aud", "audience array", "array of audience", "array containing", "multiple audience"]
    note: "Spec-compliant: PyJWT/OIDC permit an aud array and pass if the expected aud is present."
