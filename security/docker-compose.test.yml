# Throwaway target stack for the auth agent. Loopback/local only — never expose this.
#
#   # 1. bring up the mock IdP + backend (auth ON, pointed at the mock):
#   ANTHROPIC_API_KEY=sk-... docker compose -f security/docker-compose.test.yml up --build backend
#   # 2. run the agent against it (spends credits):
#   ANTHROPIC_API_KEY=sk-... docker compose -f security/docker-compose.test.yml --profile agent run --build agent
name: llm-auth-agent-test

services:
  mock-oidc:
    build:
      context: ..
      dockerfile: security/Dockerfile
    command: ["uvicorn", "mock_oidc.server:app", "--host", "0.0.0.0", "--port", "9000"]
    environment:
      OIDC_ISSUER: http://mock-oidc:9000/
      KEY_DIR: /keys
      SIGNING_KID: mock-signing-key
    volumes:
      - keys:/keys
    ports:
      - "9000:9000"

  backend:
    build:
      context: ../backend
    # Tee server output to a file on a shared volume so the agent can READ logs without the
    # Docker socket (white-box observability for read_backend_logs). App code is unchanged.
    command:
      ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port 8000 2>&1 | tee /logs/backend.log"]
    environment:
      AUTH_REQUIRED: "true"
      OIDC_ISSUER: http://mock-oidc:9000/
      OIDC_AUDIENCE: https://api.local
      OIDC_JWKS_URL: http://mock-oidc:9000/.well-known/jwks.json
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PYTHONUNBUFFERED: "1"  # flush logs promptly so the tail is fresh
    depends_on:
      - mock-oidc
    volumes:
      - logs:/logs
    ports:
      - "8000:8000"

  agent:
    build:
      context: ..
      dockerfile: security/Dockerfile
    profiles: ["agent"]
    command: ["python", "-m", "secagent.run"]
    environment:
      TARGET_BASE_URL: http://backend:8000
      ALLOWED_TARGET_HOSTS: backend
      OIDC_ISSUER: http://mock-oidc:9000/
      OIDC_AUDIENCE: https://api.local
      KEY_DIR: /keys
      REPORT_DIR: /work/security/reports
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Agent run controls (fall back to code defaults if unset):
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-6}
      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-60}      # room for the 14-seed baseline + derive phase
      AGENT_MAX_TOKENS: ${AGENT_MAX_TOKENS:-350000}  # cumulative billed-token cap (~$1.3 on Sonnet)
      AGENT_NOVELTY_PATIENCE: ${AGENT_NOVELTY_PATIENCE:-4}  # diminishing-returns stop; 0 disables
      BACKEND_LOG_FILE: /logs/backend.log
    volumes:
      - keys:/keys
      - logs:/logs:ro  # read-only: the agent may read the target's logs, never write them
      - ./reports:/work/security/reports  # persist findings/attempts/transcript to the host
    depends_on:
      - backend

volumes:
  keys:
  logs:
