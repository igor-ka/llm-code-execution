services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Inside the container the frontend is reached from the browser, so CORS uses the
      # host-facing origin defined in .env.
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
    ports:
      - "8000:8000"
    volumes:
      # The backend launches *sibling* sandbox containers via the host Docker daemon.
      # This is the local-dev seam that a CloudRunBackend would replace in GCP.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - sandbox-image-builder

  # One-shot service that builds the sandbox EXECUTION image into the host daemon so the
  # backend can run it. It exits 0 after building.
  sandbox-image-builder:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/sandbox-image:/build
    working_dir: /build
    command: ["build", "-t", "${SANDBOX_IMAGE:-llm-sandbox:latest}", "."]
    entrypoint: ["docker"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
